name: Dev Container

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
  pull_request:
    branches: [main]
    paths:
      - ".devcontainer/**"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/qobilidop/p4py-dev
          push: ${{ github.event_name == 'push' && 'filter' || 'never' }}
